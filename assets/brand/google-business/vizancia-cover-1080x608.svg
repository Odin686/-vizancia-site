<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="608" viewBox="0 0 1080 608">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1080" y2="608" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10213F"/>
      <stop offset="1" stop-color="#173D73"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#FFFFFF" stroke-opacity=".035"/>
    </pattern>
    <clipPath id="screen"><rect x="735" y="54" width="278" height="500" rx="28"/></clipPath>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="1080" height="608" rx="28" fill="url(#bg)"/>
  <rect width="1080" height="608" rx="28" fill="url(#grid)"/>
  <circle cx="984" cy="66" r="230" fill="#0891B2" opacity=".18"/>
  <circle cx="82" cy="590" r="210" fill="#2563EB" opacity=".17"/>

  <g transform="translate(64 58)">
    <rect width="78" height="78" rx="19" fill="#183B73"/>
    <path d="M19 20 39 58l20-38" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="19" cy="20" r="5.5" fill="#67E8F9"/>
    <circle cx="59" cy="20" r="5.5" fill="#2DD4BF"/>
    <circle cx="39" cy="58" r="5.5" fill="#60A5FA"/>
  </g>
  <text x="164" y="111" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="37" font-weight="700">Vizancia</text>
  <text x="64" y="235" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="52" font-weight="700">Learn how AI works.</text>
  <text x="64" y="300" fill="#67E8F9" font-family="Arial, sans-serif" font-size="52" font-weight="700">Know when to question it.</text>
  <text x="64" y="370" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="24">Practical AI literacy through short lessons,</text>
  <text x="64" y="405" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="24">active games, and thoughtful practice.</text>
  <g transform="translate(64 476)">
